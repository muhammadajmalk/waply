# Nginx configuration for waply.muhammad-ajmal.com
# Stage 1: HTTP only (for initial SSL certificate generation)
# After SSL is obtained, this file will be replaced with the HTTPS version

server {
    listen 80;
    listen [::]:80;
    server_name waply.muhammad-ajmal.com;

    # Let's Encrypt / Certbot challenge path
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other HTTP traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}
